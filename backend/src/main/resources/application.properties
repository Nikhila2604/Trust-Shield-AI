# Spring Boot Server Port configuration
server.port=8080

# MySQL Database connection parameters
spring.datasource.url=jdbc:mysql://localhost:3306/truth_shield_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_secure_mysql_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate configuration scripts
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Security & CORS setups for standard React applications
spring.security.user.name=admin
spring.security.user.password=secret
